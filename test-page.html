<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Test page for Migration Analyzer extension">
    <meta name="keywords" content="test, migration, analyzer">

    <!-- Open Graph -->
    <meta property="og:title" content="Test Page for Migration Analyzer">
    <meta property="og:description" content="A test page with various third-party services">
    <meta property="og:type" content="website">

    <title>Migration Analyzer Test Page</title>

    <!-- External CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- Internal CSS -->
    <style>
        body { background: #f8f9fa; padding: 2rem; }
        .test-section { margin: 2rem 0; padding: 1rem; background: white; border-radius: 8px; }

        /* Phase 2 Style Capture fixtures */
        :root {
            --color-primary: #E8462A;
            --color-secondary: #1A73E8;
            --color-surface: #FFFFFF;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --font-size-base: 16px;
        }

        .nav-item {
            color: var(--color-primary);
            padding: var(--spacing-sm) var(--spacing-md);
            list-style: none;
        }

        .btn-primary:hover {
            background-color: #c73a22;
            transform: scale(1.02);
        }

        input:focus {
            outline: 2px solid var(--color-secondary);
            border-color: var(--color-secondary);
        }

        .icon-label::before {
            content: "→";
            color: var(--color-secondary);
            margin-right: var(--spacing-sm);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Migration Analyzer Test Page</h1>
        <p>This page contains various elements to test the Migration Analyzer extension.</p>

        <div class="test-section">
            <h2>React Component Area</h2>
            <div id="react-root"></div>
        </div>

        <div class="test-section">
            <h2>Vue Component Area</h2>
            <div id="vue-app" v-cloak>{{ message }}</div>
        </div>

        <div class="test-section">
            <h2>Images</h2>
            <img src="https://via.placeholder.com/300x200" alt="Test image">
        </div>

        <div class="test-section">
            <h2>API Calls</h2>
            <button id="apiButton" class="btn btn-primary">Make API Call</button>
            <div id="apiResult"></div>
        </div>

        <div class="test-section">
            <h2>Phase 2 Style Capture Test</h2>
            <ul>
                <li class="nav-item">Nav Item 1</li>
                <li class="nav-item">Nav Item 2</li>
                <li class="nav-item">Nav Item 3</li>
                <li class="nav-item">Nav Item 4</li>
                <li class="nav-item">Nav Item 5</li>
            </ul>
            <button class="btn btn-primary">Hover Me</button>
            <input type="text" placeholder="Focus me">
            <span class="icon-label">Download</span>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- React (simulate) -->
    <script>
        // Simulate React
        window.React = { version: '18.0.0' };
        window.ReactDOM = { version: '18.0.0' };

        // Simulate Vue
        window.Vue = { version: '3.0.0' };

        // Add some data attributes React would use
        document.getElementById('react-root').setAttribute('data-reactroot', '');
    </script>

    <!-- Google Analytics (simulation) -->
    <script>
        // Simulate gtag
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'GA_MEASUREMENT_ID');
    </script>

    <!-- API call simulation -->
    <script>
        document.getElementById('apiButton').addEventListener('click', async () => {
            try {
                // This will generate network requests
                const response = await fetch('https://jsonplaceholder.typicode.com/posts/1');
                const data = await response.json();
                document.getElementById('apiResult').innerHTML =
                    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('apiResult').innerHTML =
                    `<div class="alert alert-danger">Error: ${error.message}</div>`;
            }
        });

        // Simulate some immediate API calls
        setTimeout(() => {
            fetch('https://jsonplaceholder.typicode.com/users')
                .then(response => response.json())
                .then(data => console.log('Users loaded:', data.length, 'users'));
        }, 1000);

        // Simulate GraphQL request
        setTimeout(() => {
            fetch('https://countries.trevorblades.com/graphql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    query: `
                        query GetCountries {
                            countries {
                                name
                                code
                                emoji
                            }
                        }
                    `
                })
            })
            .then(response => response.json())
            .then(data => console.log('GraphQL countries:', data.data?.countries?.length, 'countries'));
        }, 2000);

        // Simulate periodic requests
        setInterval(() => {
            fetch('https://jsonplaceholder.typicode.com/posts/' + Math.floor(Math.random() * 100))
                .then(response => response.json())
                .then(data => console.log('Random post:', data.id));
        }, 5000);
    </script>

    <!-- Tracking pixel simulation -->
    <img src="https://www.facebook.com/tr?id=123456789&ev=PageView" width="1" height="1" style="display:none">
</body>
</html>
