<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Federation Test Site</title>
</head>
<body>
    <h1>Module Federation Test Site</h1>
    <div id="root"></div>

    <script>
        // Simulate module federation and component-based architecture
        window.__webpack_require__ = function() { return {}; };

        // Simulate iStock-like experiences data structure
        window.experiences = {
            "federatedassetbuycard": {
                "is_active": true,
                "active_offers": {},
                "metadata": {"pulse": "true"}
            },
            "federatedheader": {
                "is_active": true,
                "active_offers": {},
                "metadata": {}
            },
            "federatedheaderuserpanel": {
                "is_active": true,
                "active_offers": {},
                "metadata": {}
            },
            "multisitearchitecturefederatedsearchbar": {
                "is_active": true,
                "active_offers": {},
                "metadata": {}
            },
            "multisitearchitecturefiltermodal": {
                "is_active": true,
                "active_offers": {},
                "metadata": {}
            },
            "setfederatedcomponentcookies": {
                "is_active": true,
                "active_offers": {},
                "metadata": {"bot": "true"}
            },
            "component1": {
                "is_active": true,
                "active_offers": {},
                "metadata": {"cns": "true"}
            },
            "component2": {
                "is_active": true,
                "active_offers": {},
                "metadata": {"services": "true"}
            },
            "component3": {
                "is_active": true,
                "active_offers": {},
                "metadata": {"spectrum": "true", "pulse": "true"}
            },
            "component4": {
                "is_active": true,
                "active_offers": {},
                "metadata": {"salesforce": "true"}
            },
            "component5": {
                "is_active": false,
                "active_offers": {"test": "control"},
                "metadata": {"cns": "true", "services": "true"}
            },
            "component6": {
                "is_active": true,
                "active_offers": {},
                "metadata": {"pulse": "true", "bot": "false"}
            }
        };

        // Simulate current site data
        window.currentSite = {
            domainSuffix: "com",
            nickname: "testsite",
            isGetty: false,
            path: "/test",
            host: "localhost"
        };

        // Simulate user data
        window.user = {
            isRemembered: false,
            isAuthenticated: false,
            locale: "en-us"
        };

        // Simulate application context
        window.application = {
            app_prefix: "test"
        };

        // Simulate environment
        window.environment = {
            isProduction: false
        };

        console.log('Module Federation test page loaded');
        console.log('Experiences:', window.experiences);
        console.log('Total experiences:', Object.keys(window.experiences).length);

        // Show some content
        document.getElementById('root').innerHTML = `
            <div style="padding: 20px; background: #f0f0f0; margin: 20px 0; border-radius: 5px;">
                <h3>Simulated Module Federation Environment</h3>
                <p><strong>Total Components:</strong> ${Object.keys(window.experiences).length}</p>
                <p><strong>Federated Components:</strong> ${Object.keys(window.experiences).filter(key =>
                    key.includes('federated') || key.includes('multisitearchitecture')).length}</p>
                <p><strong>Services:</strong> ${Array.from(new Set(Object.values(window.experiences).flatMap(exp =>
                    exp.metadata ? Object.keys(exp.metadata) : []).filter(service =>
                    service !== 'true' && service !== 'false'))).join(', ')}</p>
                <p><strong>Webpack Module Federation:</strong> ✓ Detected</p>
                <p><strong>Component Data System:</strong> ✓ Detected</p>
            </div>
        `;
    </script>

    <!-- Simulate remote entry scripts -->
    <script src="https://example.com/remoteEntry.js"></script>
    <script src="https://cdn.example.com/mf-header/latest/index.js"></script>
</body>
</html>
